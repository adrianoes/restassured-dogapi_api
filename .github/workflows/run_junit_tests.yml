name: Run JUnit Tests and Attach Reports

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      - name: Run Maven clean
        run: mvn clean



      - name: Run JUnit tests (no Cucumber)
        run: mvn test -Dtest=*Tests

      - name: List surefire-reports directory for debug
        run: ls -lR target/surefire-reports || true
        if: always()

      - name: Generate JUnit HTML report
        run: mvn surefire-report:report-only || true
        if: always()

      - name: List surefire-report directory for debug
        run: ls -lR target/surefire-report || true
        if: always()

      - name: Upload JUnit HTML report
        uses: actions/upload-artifact@v4
        with:
          name: junit-html-report
          path: target/site/
        if: always()

      - name: Upload know_bugs.md
        uses: actions/upload-artifact@v4
        with:
          name: know_bugs
          path: know_bugs.md
        if: always()